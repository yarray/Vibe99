name: Build Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - 'prerelease/**'

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg fakeroot

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux artifacts
        run: npm run make

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prerelease-linux
          path: |
            out/make/AppImage/**/*.AppImage
            out/make/deb/**/*.deb
            out/make/zip/linux/**/*.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Windows npm run path
        shell: pwsh
        run: |
          npm run capture
          $capture = Join-Path $env:TEMP 'vibe99-prototype.png'
          if (-not (Test-Path -LiteralPath $capture)) {
            throw "Expected capture output at $capture"
          }

      - name: Build Windows artifacts
        run: npm run make

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prerelease-windows
          path: |
            out/builder/Vibe99-*-windows-portable-*.exe
            out/builder/win-unpacked/**
          if-no-files-found: error
