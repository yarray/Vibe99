name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      spec:
        description: 'Spec to run (e.g. smoke, layout; leave empty for all specs)'
        required: false
        default: ''
      grep:
        description: 'Grep pattern to filter tests'
        required: false
        default: ''
  schedule:
    # Run every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

jobs:
  e2e-linux:
    # NOTE: Tauri builds + E2E tests are resource-heavy.
    # If your organization has large GitHub-hosted runners
    # (e.g. ubuntu-22.04-4core) or self-hosted runners,
    # replace the line below with the appropriate runner label.
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb webkit2gtk-driver

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - name: Install frontend dependencies
        run: npm ci

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Run E2E tests
        run: |
          if [ -n "${{ github.event.inputs.spec }}" ] && [ -n "${{ github.event.inputs.grep }}" ]; then
            npm run test:e2e -- "${{ github.event.inputs.spec }}" --grep "${{ github.event.inputs.grep }}"
          elif [ -n "${{ github.event.inputs.spec }}" ]; then
            npm run test:e2e -- "${{ github.event.inputs.spec }}"
          elif [ -n "${{ github.event.inputs.grep }}" ]; then
            npm run test:e2e -- --grep "${{ github.event.inputs.grep }}"
          else
            npm run test:e2e
          fi

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-linux-artifacts
          path: |
            e2e/screenshots/
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore
