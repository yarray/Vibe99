name: Changelog

on:
  pull_request:

jobs:
  towncrier-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Towncrier
        run: python -m pip install towncrier

      - name: Require changelog fragment
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: node ./scripts/check-changelog-fragment.mjs "origin/${GITHUB_BASE_REF}"

      - name: Validate changelog fragments
        run: towncrier check --config towncrier.toml --compare-with origin/main
