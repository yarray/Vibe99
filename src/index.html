<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Vibe99</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="tabs-panel" aria-label="Pane tabs">
        <div class="tabs-list" id="tabs-list"></div>
        <div class="tabs-actions">
          <button class="tabs-add" id="tabs-add" type="button" aria-label="Add pane">+</button>
          <button class="tabs-fullscreen" id="tabs-fullscreen" type="button" aria-label="Toggle fullscreen">&#9974;</button>
          <button class="tabs-settings" id="tabs-settings" type="button" aria-label="Open settings">&#9881;</button>
        </div>
        <section class="settings-panel is-hidden" id="settings-panel" aria-label="Settings">
          <div class="settings-section">
            <label class="settings-row" for="font-size-input">
              <span>Font size</span>
            </label>
            <input class="settings-number" id="font-size-input" type="number" min="10" max="24" step="1" value="13" />

            <label class="settings-row" for="font-family-input">
              <span>Font family</span>
            </label>
            <input class="settings-number" id="font-family-input" type="text" placeholder="e.g. JetBrains Mono, Consolas" value="" />

            <div class="settings-row settings-clickable-row" id="pane-width-settings-btn" role="button" tabindex="0" aria-label="Configure pane width">
              <span>Pane width</span>
              <span class="settings-row-hint">›</span>
            </div>
            <div class="settings-row settings-clickable-row" id="pane-opacity-settings-btn" role="button" tabindex="0" aria-label="Configure pane opacity">
              <span>Pane opacity</span>
              <span class="settings-row-hint">›</span>
            </div>
            <div class="settings-row settings-clickable-row" id="pane-mask-opacity-settings-btn" role="button" tabindex="0" aria-label="Configure BG mask opacity">
              <span>BG mask opacity</span>
              <span class="settings-row-hint">›</span>
            </div>
          </div>

          <div class="settings-divider"></div>

          <div class="settings-section">
            <div class="settings-row settings-clickable-row" id="shell-profiles-settings-btn" role="button" tabindex="0" aria-label="Configure shell profiles">
              <span>Shell Profiles</span>
              <span class="settings-row-hint">›</span>
            </div>
          </div>

          <div class="settings-divider"></div>

          <div class="settings-section">
            <div class="settings-row settings-clickable-row" id="keyboard-shortcuts-settings-btn" role="button" tabindex="0" aria-label="Configure keyboard shortcuts">
              <span>Keyboard Shortcuts</span>
              <span class="settings-row-hint">›</span>
            </div>
          </div>
        </section>
      </header>

      <main class="stage-wrap">
        <section class="stage" id="stage" aria-label="Pane stage"></section>
      </main>

      <footer class="status-bar">
        <span id="status-label"></span>
        <span class="status-hint" id="status-hint"></span>
      </footer>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
