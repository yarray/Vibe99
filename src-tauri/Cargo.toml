[package]
name = "vibe99"
version = "0.4.5"
description = "Vibe99 terminal workspace"
authors = [""]
edition = "2021"

[lib]
name = "vibe99_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
